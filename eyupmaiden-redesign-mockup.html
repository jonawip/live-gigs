<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ey Up Maiden – Gigs (redesign mockup)</title>
  <meta name="theme-color" content="#080808">
  <style>
    /* ============================================================
       EY UP MAIDEN — GIG LIST REDESIGN (visual reference mockup)
       Single goal: clarity for the band + ease of use on mobile.
       Design system reused from the existing add/add.css tokens so
       the whole app reads as one product. Red = brand/logo only.
       Gold = interaction + "next gig" emphasis.
       This file is a STANDALONE reference. Sample data is inline.
       ============================================================ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: dark;
      --bg: #080808;
      --bg-elevated: #121212;
      --bg-elevated-2: #181818;
      --border: #2a2a2a;
      --border-soft: #1f1f1f;
      --text: #ffffff;
      --text-muted: #b8b8b8;
      --text-dim: #8a8a8a;
      --gold: #e8c84a;
      --gold-dim: rgba(232, 200, 74, 0.14);
      --gold-glow: rgba(232, 200, 74, 0.22);
      --red: #e2231a; /* logo / brand only */
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 18px;
      --space-xs: 6px;
      --space-sm: 10px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --touch: 52px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 120% 60% at 50% -20%, rgba(232, 200, 74, 0.07), transparent),
        radial-gradient(ellipse 80% 40% at 100% 100%, rgba(232, 200, 74, 0.04), transparent);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100dvh;
      font-size: 16px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    .app { max-width: 560px; margin-inline: auto; }

    /* ── Header ── */
    header {
      padding: calc(20px + env(safe-area-inset-top, 0px)) var(--space-md) 18px;
      text-align: center;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute; bottom: 0; left: 12%; right: 12%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.6;
    }
    /* Placeholder wordmark — the real app uses icon.svg */
    .logo {
      font-style: italic;
      font-weight: 900;
      font-size: clamp(28px, 9vw, 40px);
      line-height: 0.92;
      letter-spacing: -0.01em;
      color: var(--red);
      text-transform: uppercase;
      transform: skewX(-4deg);
      text-shadow: 0 2px 18px rgba(226, 35, 26, 0.25);
    }
    .subtitle {
      margin-top: 10px;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 700;
    }

    /* ── Sticky control bar: segmented tabs ── */
    .controls {
      position: sticky; top: 0; z-index: 20;
      padding: var(--space-sm) var(--space-md);
      background: rgba(8, 8, 8, 0.85);
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
      border-bottom: 1px solid var(--border-soft);
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px;
    }
    .tab-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 46px;
      border: none; border-radius: 999px;
      background: transparent;
      color: var(--text-dim);
      font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      touch-action: manipulation;
    }
    .tab-btn .count {
      min-width: 26px; padding: 2px 8px;
      border-radius: 999px;
      background: var(--bg-elevated-2);
      color: var(--text-dim);
      font-size: 13px; font-weight: 800;
    }
    .tab-btn.active { background: var(--gold); color: #0a0a0a; }
    .tab-btn.active .count { background: rgba(0,0,0,0.18); color: #0a0a0a; }

    main { padding: var(--space-md) var(--space-md) 48px; }
    .panel { display: none; }
    .panel.active { display: block; animation: fade 0.2s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    /* ── Booked gig card ── */
    .gig-list { display: flex; flex-direction: column; gap: var(--space-sm); }

    .gig {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--space-md);
      align-items: start;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
    }

    /* Date tile — the primary scan anchor */
    .gig__date {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 62px; padding: 8px 0;
      border-radius: var(--radius-md);
      background: var(--bg-elevated-2);
      border: 1px solid var(--border);
      line-height: 1;
    }
    .gig__day { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
    .gig__mon { margin-top: 4px; font-size: 12px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); }
    .gig__dow { margin-top: 3px; font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }

    .gig__body { min-width: 0; }
    .gig__topline { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .gig__venue { font-size: 18px; font-weight: 800; letter-spacing: -0.01em; }
    .gig__town {
      margin-top: 3px;
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 14.5px; color: var(--text-muted); font-weight: 600;
    }
    .gig__town svg { width: 14px; height: 14px; fill: var(--text-dim); flex-shrink: 0; }

    /* Quiet secondary meta */
    .gig__meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; min-height: 30px;
      border-radius: 999px;
      font-size: 13px; font-weight: 700;
      border: 1px solid var(--border);
      background: var(--bg-elevated-2);
      color: var(--text-muted);
    }
    .chip svg { width: 13px; height: 13px; fill: currentColor; }
    .chip--fee { color: var(--gold); border-color: rgba(232,200,74,0.3); background: var(--gold-dim); }
    .chip--tbc { color: var(--text-dim); }

    .gig__notes {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border-soft);
      font-size: 13.5px; color: var(--text-muted); line-height: 1.5;
    }
    .gig__notes b { color: var(--text-dim); font-weight: 800; text-transform: uppercase; font-size: 11px; letter-spacing: 0.06em; }

    /* Next gig — unmissable */
    .gig--next {
      border-color: rgba(232, 200, 74, 0.55);
      background:
        linear-gradient(180deg, rgba(232,200,74,0.06), transparent 60%),
        var(--bg-elevated);
      box-shadow: 0 0 0 1px rgba(232,200,74,0.18), 0 10px 30px rgba(0,0,0,0.4);
    }
    .gig--next .gig__date { background: var(--gold); border-color: var(--gold); }
    .gig--next .gig__day { color: #0a0a0a; }
    .gig--next .gig__mon { color: #0a0a0a; }
    .gig--next .gig__dow { color: rgba(10,10,10,0.7); }
    .badge-next {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 999px;
      background: var(--gold); color: #0a0a0a;
      font-size: 11px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .gig__countdown { margin-left: auto; font-size: 13px; font-weight: 700; color: var(--gold); }

    /* ── Available dates: bucketed by year, scannable grid ── */
    .avail-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: var(--space-md); }
    .avail-hint { font-size: 13px; color: var(--text-dim); }
    .btn-ghost {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 44px; padding: 0 16px;
      border: 1px solid var(--gold); border-radius: 999px;
      background: transparent; color: var(--gold);
      font-family: inherit; font-size: 14px; font-weight: 800;
      cursor: pointer; touch-action: manipulation;
      transition: background 0.15s, color 0.15s;
    }
    .btn-ghost:active { background: var(--gold-dim); }

    /* Year bucket headers */
    .avail-year {
      display: flex; align-items: baseline; gap: 10px;
      margin: var(--space-lg) 0 var(--space-sm);
      font-size: 13px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-dim);
    }
    .avail-year:first-child { margin-top: 0; }
    .avail-year__count {
      letter-spacing: normal; color: var(--gold);
      font-size: 12px; font-weight: 800;
    }
    .avail-year::after { content: ''; flex: 1; height: 1px; background: var(--border-soft); }

    .avail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: var(--space-sm);
    }
    .avail {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 10px 12px; min-height: var(--touch);
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }
    .avail__date { font-size: 14.5px; font-weight: 700; min-width: 0; }
    .avail__dow { color: var(--text-dim); font-weight: 600; }
    .avail__del {
      flex-shrink: 0;
      width: 34px; height: 34px; display: grid; place-items: center;
      border: 1px solid var(--border); border-radius: 9px;
      background: transparent; color: var(--text-dim);
      cursor: pointer; touch-action: manipulation;
      transition: all 0.15s;
    }
    .avail__del svg { width: 15px; height: 15px; fill: currentColor; }
    .avail__del.is-confirming {
      width: auto; padding: 0 12px; min-height: 34px;
      background: #b00000; border-color: #b00000; color: #fff;
      font-size: 12px; font-weight: 800;
    }

    footer {
      text-align: center; padding: 28px var(--space-md) calc(28px + env(safe-area-inset-bottom,0px));
      font-size: 12.5px; color: var(--text-dim);
      border-top: 1px solid var(--border-soft); margin-top: var(--space-lg);
    }

    .empty { text-align: center; padding: 48px 16px; color: var(--text-dim); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">Ey Up<br>Maiden</div>
      <p class="subtitle">2026 Gig Schedule</p>
    </header>

    <div class="controls">
      <div class="tabs" role="tablist">
        <button class="tab-btn active" data-tab="booked" role="tab">
          Booked <span class="count" id="count-booked">0</span>
        </button>
        <button class="tab-btn" data-tab="available" role="tab">
          Available <span class="count" id="count-available">0</span>
        </button>
      </div>
    </div>

    <main>
      <section id="panel-booked" class="panel active" role="tabpanel">
        <div class="gig-list" id="list-booked"></div>
      </section>
      <section id="panel-available" class="panel" role="tabpanel">
        <div class="avail-toolbar">
          <span class="avail-hint" id="avail-hint"></span>
          <button class="btn-ghost" id="copy-btn">Copy all dates</button>
        </div>
        <div id="list-available"></div>
      </section>
    </main>

    <footer id="footer"></footer>
  </div>

  <script>
    /* ---- Sample data (mirrors the real {date,venue,town,fee,notes,comms,booked} shape) ---- */
    const SAMPLE = [
      { date: '2026-06-26', venue: 'The Pub', town: 'Lancaster', fee: '150', notes: 'Load in from 6pm, on stage 9pm. Parking round the back.', comms: 'Confirmed with Dave', booked: true },
      { date: '2026-07-18', venue: 'The Star & Garter', town: 'Manchester', fee: '250', notes: '', comms: 'Awaiting contract', booked: true },
      { date: '2026-07-25', venue: 'Jacs', town: 'Aberdare', fee: 'TBC', notes: 'Support slot, 30 min set.', comms: '', booked: true },
      { date: '2026-08-08', venue: 'The Boathouse', town: 'Wakefield', fee: '200', notes: 'Backline provided.', comms: 'Confirmed', booked: true },
      { date: '2026-09-12', venue: 'Trades Club', town: 'Hebden Bridge', fee: '300', notes: '', comms: 'Deposit paid', booked: true },
      // available dates — spanning two years to show the year buckets
      { date: '2026-07-04', booked: false }, { date: '2026-07-11', booked: false },
      { date: '2026-08-01', booked: false }, { date: '2026-08-15', booked: false },
      { date: '2026-08-22', booked: false }, { date: '2026-08-29', booked: false },
      { date: '2026-09-05', booked: false }, { date: '2026-09-19', booked: false },
      { date: '2026-09-26', booked: false }, { date: '2026-10-03', booked: false },
      { date: '2026-10-10', booked: false }, { date: '2026-10-17', booked: false },
      { date: '2027-01-16', booked: false }, { date: '2027-02-13', booked: false },
      { date: '2027-03-06', booked: false }, { date: '2027-04-10', booked: false },
    ];

    /* ---- Helpers (same intent as app.js) ---- */
    function d(dateStr){ const x = new Date(dateStr); return isNaN(x) ? null : x; }
    function fmtFull(s){ const x=d(s); return x ? x.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : s; }
    function dayNum(s){ return d(s)?.getDate(); }
    function monShort(s){ return d(s)?.toLocaleDateString('en-GB',{month:'short'}).toUpperCase(); }
    function dowShort(s){ return d(s)?.toLocaleDateString('en-GB',{weekday:'short'}); }
    function isTbc(fee){ return fee && /tbc|ticket/i.test(fee); }
    function fmtFee(fee){
      if(!fee) return '';
      if(isTbc(fee)) return fee;
      const num = parseFloat(String(fee).replace(/[^0-9.]/g,''));
      return isNaN(num) ? fee : '£' + (num % 1 === 0 ? num : num.toFixed(2));
    }
    function daysAway(s){
      const today = new Date(); today.setHours(0,0,0,0);
      const x = d(s); x.setHours(0,0,0,0);
      const n = Math.round((x - today) / 86400000);
      if (n === 0) return 'Today';
      if (n === 1) return 'Tomorrow';
      return 'in ' + n + ' days';
    }
    const PIN = '<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7Zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5Z"/></svg>';
    const MONEY = '<svg viewBox="0 0 24 24"><path d="M12 1a11 11 0 1 0 0 22 11 11 0 0 0 0-22Zm.9 16.7v1.3h-1.6v-1.3c-1.6-.2-2.9-1.1-3-2.8h1.7c.1.8.7 1.4 2 1.4 1.2 0 1.7-.6 1.7-1.2 0-.8-.6-1.1-2.2-1.5-1.7-.4-3-1-3-2.7 0-1.3 1-2.2 2.4-2.5V6.8h1.6v1.3c1.5.3 2.4 1.3 2.5 2.6h-1.7c-.1-.7-.6-1.3-1.7-1.3-1 0-1.6.5-1.6 1.1 0 .7.6 1 2.1 1.4 1.8.4 3.1 1.1 3.1 2.8 0 1.4-1 2.3-2.7 2.7Z"/></svg>';
    const COMMS = '<svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4-8 5-8-5V6l8 5 8-5v2Z"/></svg>';
    const TRASH = '<svg viewBox="0 0 24 24"><path d="M6 7h12l-1 13H7L6 7Zm9-3 1 1h4v2H4V5h4l1-1h6Z"/></svg>';

    const esc = s => (s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    function bookedCard(g, isNext){
      const fee = g.fee ? `<span class="chip chip--fee ${isTbc(g.fee)?'chip--tbc':''}">${MONEY}${esc(fmtFee(g.fee))}</span>` : '';
      const comms = g.comms ? `<span class="chip">${COMMS}${esc(g.comms)}</span>` : '';
      const notes = g.notes ? `<div class="gig__notes"><b>Notes</b><br>${esc(g.notes)}</div>` : '';
      const meta = (fee || comms) ? `<div class="gig__meta">${fee}${comms}</div>` : '';
      const next = isNext
        ? `<span class="badge-next">★ Next gig</span><span class="gig__countdown">${daysAway(g.date)}</span>`
        : '';
      return `
        <article class="gig ${isNext?'gig--next':''}">
          <div class="gig__date">
            <span class="gig__day">${dayNum(g.date)}</span>
            <span class="gig__mon">${monShort(g.date)}</span>
            <span class="gig__dow">${dowShort(g.date)}</span>
          </div>
          <div class="gig__body">
            <div class="gig__topline">
              <h3 class="gig__venue">${esc(g.venue)}</h3>
              ${next}
            </div>
            <div class="gig__town">${PIN}${esc(g.town)}</div>
            ${meta}
            ${notes}
          </div>
        </article>`;
    }

    function availCard(g){
      return `
        <div class="avail">
          <span class="avail__date">${dayNum(g.date)} ${monShort(g.date)} <span class="avail__dow">${dowShort(g.date)}</span></span>
          <button class="avail__del" data-date="${g.date}" aria-label="Delete ${fmtFull(g.date)}">${TRASH}</button>
        </div>`;
    }

    function render(){
      const sortByDate = a => [...a].sort((x,y)=> new Date(x.date)-new Date(y.date));
      const booked = sortByDate(SAMPLE.filter(g=>g.booked));
      const available = sortByDate(SAMPLE.filter(g=>!g.booked));
      const nextDate = booked[0]?.date;

      document.getElementById('count-booked').textContent = booked.length;
      document.getElementById('count-available').textContent = available.length;

      document.getElementById('list-booked').innerHTML =
        booked.length ? booked.map(g=>bookedCard(g, g.date===nextDate)).join('')
                      : '<p class="empty">No upcoming booked gigs.</p>';

      document.getElementById('avail-hint').textContent = available.length + ' open dates';

      // Bucket available dates by year
      const byYear = {};
      available.forEach(g => {
        const y = new Date(g.date).getFullYear();
        (byYear[y] ||= []).push(g);
      });
      const years = Object.keys(byYear).sort();
      document.getElementById('list-available').innerHTML =
        available.length
          ? years.map(y => `
              <div class="avail-year"><span>${y}</span><span class="avail-year__count">${byYear[y].length}</span></div>
              <div class="avail-grid">${byYear[y].map(availCard).join('')}</div>
            `).join('')
          : '<p class="empty">No upcoming available dates.</p>';

      document.getElementById('footer').textContent = 'Ey Up Maiden · Last updated 21 June 2026';
    }

    /* tabs */
    document.querySelectorAll('.tab-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
      });
    });

    /* delete confirm demo (2-tap) */
    let confirming = null, t = null;
    document.addEventListener('click', e=>{
      const del = e.target.closest('.avail__del'); if(!del) return;
      if(confirming !== del){
        if(confirming){ confirming.classList.remove('is-confirming'); confirming.innerHTML = TRASH; }
        confirming = del; del.classList.add('is-confirming'); del.textContent = 'Confirm?';
        clearTimeout(t); t = setTimeout(()=>{ del.classList.remove('is-confirming'); del.innerHTML = TRASH; confirming=null; }, 4000);
      } else {
        del.closest('.avail').style.opacity = 0.4; del.textContent = 'Deleting…';
      }
    });

    document.getElementById('copy-btn').addEventListener('click', e=>{
      e.target.textContent = 'Copied!'; setTimeout(()=>e.target.textContent='Copy all dates', 1500);
    });

    render();
  </script>
</body>
</html>
