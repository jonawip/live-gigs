<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Add a Gig">
<title>Add a Gig – Ey Up Maiden</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { color-scheme: dark; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f;
    color: #f0f0f0;
    min-height: 100vh;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    background: #1a1a1a;
    border-bottom: 2px solid #e8c84a;
    padding: 20px 20px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #e8c84a;
    line-height: 1;
  }
  .header p { font-size: 13px; color: #666; margin-top: 5px; }

  /* ── Sections ── */
  .section { padding: 20px 16px 0; }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 8px;
    padding-left: 4px;
  }

  /* ── Card ── */
  .card {
    background: #1a1a1a;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
  }

  .row {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid #222;
    min-height: 64px;
  }
  .row:last-child { border-bottom: none; }

  .row-icon {
    width: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .row-body {
    flex: 1;
    min-width: 0;
    padding: 10px 14px 10px 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .row-label {
    font-size: 12px;
    color: #666;
    font-weight: 600;
    letter-spacing: 0.03em;
    margin-bottom: 2px;
  }
  .req { color: #e8c84a; }

  input, textarea {
    background: transparent;
    border: none;
    color: #f0f0f0;
    font-size: 17px;
    font-family: inherit;
    width: 100%;
    padding: 0;
    display: block;
    -webkit-appearance: none;
    appearance: none;
    line-height: 1.3;
  }
  input:focus, textarea:focus { outline: none; }
  input::placeholder, textarea::placeholder { color: #3a3a3a; }

  input[type="date"],
  input[type="time"] { color: #f0f0f0; }

  .time-pair { display: flex; }
  .time-pair .row { flex: 1; }
  .time-pair .row:first-child { border-right: 1px solid #222; }

  textarea {
    resize: none;
    min-height: 80px;
    line-height: 1.5;
    padding-top: 2px;
  }

  /* ── Submit ── */
  .submit-wrap { padding: 24px 16px 48px; }

  button[type=submit] {
    background: #e8c84a;
    color: #111;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 20px;
    width: 100%;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    font-family: inherit;
  }
  button[type=submit]:active { opacity: 0.8; }
  button[type=submit]:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ── Sending state ── */
  #sending {
    display: none;
    text-align: center;
    padding: 48px 20px;
    color: #666;
    font-size: 15px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Ey Up Maiden</h1>
  <p>Add a new gig</p>
</div>

<!--
  ACTION: paste your Apps Script exec URL here
  e.g. https://script.google.com/macros/s/YOURKEY/exec
-->
<form method="POST"
      action="https://script.google.com/macros/s/AKfycbzBcqnU-Phr7WAkZduhgrelpt-tAVZ_gEEThNW-Maf5th3lJFmOM_vJu3hK1NlpgpRC/exec"
      id="gigForm">

  <div class="section">
    <div class="section-title">When &amp; Where</div>
    <div class="card">

      <div class="row">
        <div class="row-icon">📅</div>
        <div class="row-body">
          <span class="row-label">Date <span class="req">*</span></span>
          <input type="date" name="date" id="dateInput" required>
        </div>
      </div>

      <div class="row">
        <div class="row-icon">📍</div>
        <div class="row-body">
          <span class="row-label">Town / City <span class="req">*</span></span>
          <input type="text" name="town" required placeholder="Burnley"
                 autocomplete="off" autocapitalize="words">
        </div>
      </div>

      <div class="row">
        <div class="row-icon">🎸</div>
        <div class="row-body">
          <span class="row-label">Venue <span class="req">*</span></span>
          <input type="text" name="venue" required placeholder="Sanctuary Rock Bar"
                 autocomplete="off" autocapitalize="words">
        </div>
      </div>

      <div class="time-pair">
        <div class="row">
          <div class="row-icon">▶</div>
          <div class="row-body">
            <span class="row-label">Start</span>
            <input type="time" name="startTime" value="19:00">
          </div>
        </div>
        <div class="row">
          <div class="row-icon">■</div>
          <div class="row-body">
            <span class="row-label">End</span>
            <input type="time" name="endTime" value="23:45">
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="section">
    <div class="section-title">Deal</div>
    <div class="card">
      <div class="row">
        <div class="row-icon">💷</div>
        <div class="row-body">
          <span class="row-label">Agreed Fee</span>
          <input type="text" name="fee" placeholder="£400 / Ticketed / Door Split"
                 autocomplete="off">
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Info</div>
    <div class="card">

      <div class="row">
        <div class="row-icon">💬</div>
        <div class="row-body">
          <span class="row-label">Comms</span>
          <input type="text" name="comms" placeholder="Kurt FB / email / call"
                 autocomplete="off">
        </div>
      </div>

      <div class="row" style="min-height: 100px; align-items: flex-start;">
        <div class="row-icon" style="padding-top: 14px;">📝</div>
        <div class="row-body" style="padding-top: 12px;">
          <span class="row-label">Notes</span>
          <textarea name="notes" placeholder="PA needed? Anything else…"></textarea>
        </div>
      </div>

    </div>
  </div>

  <div class="submit-wrap">
    <button type="submit" id="submitBtn">Add Gig</button>
  </div>

</form>

<div id="sending">Saving...</div>

<script>
  // Pre-fill today's date
  (function () {
    var d  = new Date();
    var yy = d.getFullYear();
    var mm = String(d.getMonth() + 1).padStart(2, '0');
    var dd = String(d.getDate()).padStart(2, '0');
    document.getElementById('dateInput').value = yy + '-' + mm + '-' + dd;
  })();

  // Disable submit button on submit to prevent double-tap
  document.getElementById('gigForm').addEventListener('submit', function () {
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = 'Saving...';
  });
</script>

</body>
</html>
